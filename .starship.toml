# モダンで情報量のある 2 行プロンプト（世間でよく見る構成）
add_newline = true
scan_timeout = 30
command_timeout = 1200

format = """
$os$username$hostname$directory$git_branch$git_status$nodejs$python$golang$rust$docker_context$kubernetes$aws$gcloud$time
$character
"""

[os]
disabled = false
style = "bold white"
format = "[$symbol ]($style)"

[os.symbols]
Macos = ""
Ubuntu = ""
Windows = ""
Linux = ""

[username]
show_always = true
style_user = "bold emerald"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bold green"
format = "[@$hostname]($style) "
trim_at = "."

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " "
format = "[ $path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*$count"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol($version )(\\($virtualenv\\) )]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context ]($style)"

[kubernetes]
disabled = false
symbol = "☸ "
style = "bold blue"
format = "[$symbol$context( \($namespace\)) ]($style)"

[aws]
symbol = " "
style = "bold 214"
format = "[$symbol($profile )(\\($region\\) )]($style)"

[gcloud]
symbol = "󱇶 "
style = "bold blue"
format = "[$symbol$account(@$domain)(:$region) ]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "bold bright-black"
format = "[ $time]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
